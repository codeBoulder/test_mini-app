<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUNKER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-deep: #050505;
            --pulse-color: rgba(139, 0, 0, 0.3); 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-top: 20px; 
        }

        /* Імпульсація по краях екрана (залишається без змін) */
        .screen-pulse {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9999;
            animation: screen-breathing 4s ease-in-out infinite;
        }

        @keyframes screen-breathing {
            0% { box-shadow: inset 0 0 0px rgba(0, 0, 0, 0); }
            50% { box-shadow: inset 0 0 50px 5px var(--pulse-color); }
            100% { box-shadow: inset 0 0 0px rgba(0, 0, 0, 0); }
        }

        .content {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px; 
        }

        /* Дрібні атмосферні іскри-попіл */
        .spark {
            position: fixed;
            top: -20px; 
            background-color: #ff4444;
            box-shadow: 0 0 5px #ff0000, 0 0 10px #8b0000; 
            border-radius: 50%;
            pointer-events: none; 
            z-index: 9998; 
        }

        /* Падіння з використанням змінної --drift для відхилення вбік */
        @keyframes fall {
            to { transform: translateY(110vh) translateX(var(--drift)); }
        }

        /* Дуже повільне і м'яке мерехтіння */
        @keyframes blink {
            0% { opacity: 0; }
            100% { opacity: 0.6; } /* Максимальна яскравість знижена, щоб не «било» по очах */
        }
    </style>
</head>
<body>

<div class="screen-pulse"></div>

<div class="content">
    <img src="https://codeboulder.github.io/test_mini-app/new%20rules.png" alt="Правила гри">
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('#050505');
    tg.setBackgroundColor('#050505');

    function createSpark() {
        const spark = document.createElement('div');
        spark.classList.add('spark');

        // Стартова позиція
        const startX = Math.random() * window.innerWidth;
        spark.style.left = startX + 'px';

        // Розмір ще менший (від 0.5 до 2 пікселів)
        const size = Math.random() * 2 + 0.5;
        spark.style.width = size + 'px';
        spark.style.height = size + 'px';

        // Задаємо випадковий дрейф вліво або вправо (від -50px до +50px)
        const drift = (Math.random() * 100 - 50) + 'px';
        spark.style.setProperty('--drift', drift);

        // ДУЖЕ повільне падіння: від 12 до 25 секунд
        const fallDuration = Math.random() * 13 + 12;
        
        // Повільне затухання/загоряння: від 2 до 4 секунд на один цикл
        const blinkDuration = Math.random() * 2 + 2;
        
        spark.style.animation = `fall ${fallDuration}s linear forwards, blink ${blinkDuration}s ease-in-out infinite alternate`;

        document.body.appendChild(spark);

        setTimeout(() => {
            spark.remove();
        }, fallDuration * 1000);
    }

    // Створюємо іскри рідше: одну раз на 1.2 секунди
    setInterval(createSpark, 100);
</script>

</body>
</html>
