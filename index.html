<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUNKER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-deep: #050505;
            /* Ще більш приглушений темно-червоний для м'якої атмосфери */
            --pulse-color: rgba(139, 0, 0, 0.15); 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Контейнер для центрування контенту */
        .content {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0 40px 0; /* 20px відступ зверху, 40px знизу */
            position: relative;
            z-index: 10;
        }

        /* Обгортка для картинки, яка і створює світіння */
        .image-wrapper {
            /* Робимо ширину трохи меншою за екран (по 12px з кожного боку), щоб було видно тінь */
            width: calc(100% - 24px); 
            max-width: 600px; /* Обмеження ширини для планшетів/ПК */
            border-radius: 12px;
            /* Повільна атмосферна пульсація на 6 секунд */
            animation: image-breathing 6s ease-in-out infinite;
        }

        /* Сама картинка з правилами */
        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px; /* Має збігатися з обгорткою */
        }

        /* Анімація м'якого зовнішнього світіння навколо картинки */
        @keyframes image-breathing {
            0% { box-shadow: 0 0 0px 0px rgba(139, 0, 0, 0); }
            50% { box-shadow: 0 0 40px 5px var(--pulse-color); }
            100% { box-shadow: 0 0 0px 0px rgba(139, 0, 0, 0); }
        }

        /* Дрібні атмосферні іскри-попіл */
        .spark {
            position: fixed;
            top: -20px; 
            background-color: #ff4444;
            box-shadow: 0 0 5px #ff0000, 0 0 10px #8b0000; 
            border-radius: 50%;
            pointer-events: none; 
            z-index: 9998; 
        }

        @keyframes fall {
            to { transform: translateY(110vh) translateX(var(--drift)); }
        }

        @keyframes blink {
            0% { opacity: 0; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="content">
    <div class="image-wrapper">
        <img src="https://codeboulder.github.io/test_mini-app/new%20rules.png" alt="Правила гри">
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('#050505');
    tg.setBackgroundColor('#050505');

    function createSpark() {
        const spark = document.createElement('div');
        spark.classList.add('spark');

        const startX = Math.random() * window.innerWidth;
        spark.style.left = startX + 'px';

        const size = Math.random() * 1.5 + 0.5;
        spark.style.width = size + 'px';
        spark.style.height = size + 'px';

        const drift = (Math.random() * 100 - 50) + 'px';
        spark.style.setProperty('--drift', drift);

        const fallDuration = Math.random() * 13 + 12;
        const blinkDuration = Math.random() * 2 + 2;
        
        spark.style.animation = `fall ${fallDuration}s linear forwards, blink ${blinkDuration}s ease-in-out infinite alternate`;

        document.body.appendChild(spark);

        setTimeout(() => {
            spark.remove();
        }, fallDuration * 1000);
    }

    setInterval(createSpark, 700);
</script>

</body>
</html>
